[pytest]
# Only collect the real unit/integration suite. The example_*/ dirs hold manual
# live-LLM harnesses (run_analyze.py), not pytest tests.
testpaths = tests

# Agent-optimized logging: structured, live, greppable. Every test step emits
# [STEPn][CASE ...] EXPECT/ACTUAL/RESULT lines so an agent can read the run log
# and understand exactly what was exercised and why something passed/failed/skipped.
log_cli = true
log_cli_level = INFO
log_cli_format = %(message)s
addopts = -ra -q

markers =
    unit: fast, deterministic, no network/model/credentials.
    integration: crosses module boundaries; may need a built index, optional deps, or live LLM.
    live_llm: needs Vertex/ADC credentials (real Gemini call).
    needs_embeddings: needs fastembed (+ a model download) for real embeddings.
    contract: asserts a data-type contract (shape/keys/types) for a step's I/O.
